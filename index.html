<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์บุคลากรโรงเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy-primary: #0a192f;
      --navy-dark: #030712;
      --orange-accent: #ff7600;
      --orange-light: #ffaa44;
      --orange-gradient: linear-gradient(135deg, #ff9800, #e65100);
      --glass-bg: rgba(13, 27, 42, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: radial-gradient(circle at 80% 20%, #1a365d 0%, var(--navy-dark) 70%);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      margin: 0;
      position: relative;
    }

    /* แสงสะท้อนเรืองแสงด้านหลังการ์ดเพื่อความหรูหรา */
    body::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255, 118, 0, 0.1) 0%, rgba(0,0,0,0) 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    /* Loading Screen เคลื่อนไหวสมูท */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--navy-dark);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255, 118, 0, 0.15);
      border-top-color: var(--orange-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Ultra Premium Glassmorphic Card */
    .profile-card {
      background: var(--glass-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px 28px 32px 28px;
      width: 100%;
      max-width: 410px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 
                  0 0 40px 0 rgba(255, 118, 0, 0.03);
      position: relative;
      overflow: hidden;
      z-index: 1;
      display: none;
      transform: translateY(10px);
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      to { transform: translateY(0); }
    }

    /* เส้นแถบสีส้มด้านบนแบบพรีเมียมเรืองแสง */
    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 5px;
      background: var(--orange-gradient);
      box-shadow: 0 2px 10px rgba(255, 118, 0, 0.4);
    }

    /* กรอบรูปภาพออร่า */
    .avatar-container {
      width: 136px; height: 136px;
      margin: 0 auto 24px auto;
      position: relative;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(145deg, var(--orange-light), var(--orange-accent));
      box-shadow: 0 10px 25px -5px rgba(255, 118, 0, 0.4);
    }

    .avatar-img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      background-color: #1e293b;
      border: 4px solid #0f172a;
    }

    .teacher-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .teacher-dept {
      font-size: 0.95rem;
      color: var(--orange-light);
      text-align: center;
      font-weight: 500;
      margin-bottom: 32px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* การจัดกลุ่มรายการข้อมูล */
    .info-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-item {
      background: rgba(15, 23, 42, 0.45);
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.25s ease;
    }

    .info-item:hover {
      background: rgba(15, 23, 42, 0.7);
      border-color: rgba(255, 118, 0, 0.2);
      transform: translateY(-2px);
    }

    .info-icon-box {
      width: 38px; height: 38px;
      background: rgba(255, 118, 0, 0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--orange-light);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .info-content {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .info-label {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 0.95rem;
      color: #e2e8f0;
      font-weight: 400;
      word-break: break-word;
    }

    /* หน้าต่างแจ้งเตือนข้อผิดพลาด */
    .alert-card {
      background: rgba(239, 68, 68, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 24px;
      padding: 35px 25px;
      max-width: 380px;
      text-align: center;
      border-top: 5px solid #ef4444;
      display: none;
      z-index: 1;
    }

    .alert-icon {
      font-size: 3rem;
      color: #ef4444;
      margin-bottom: 16px;
    }

    .school-footer {
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
      margin-top: 28px;
      letter-spacing: 1px;
      font-weight: 500;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p class="mt-3 text-muted" style="font-size: 0.85rem; letter-spacing: 0.5px;">กำลังโหลดโปรไฟล์ดิจิทัล...</p>
  </div>

  <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="alert-card shadow-2xl" id="error-card">
      <div class="alert-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <h5 class="text-white font-semibold mb-2">ไม่สามารถเข้าถึงข้อมูลได้</h5>
      <p class="text-slate-400 mb-0" id="error-msg" style="font-size: 0.9rem; font-weight: 300;"></p>
    </div>
      
    <div class="profile-card shadow-2xl" id="profile-card">
      <div class="avatar-container">
        <img id="t-photo" src="" alt="Teacher Profile" class="avatar-img" onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/initials/svg?seed=Teacher&backgroundColor=0a192f&textColor=ffffff';">
      </div>

      <h2 class="teacher-name" id="t-name">-</h2>
      <div class="teacher-dept" id="t-dept">-</div>

      <div class="info-body">
        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-id-badge"></i></div>
          <div class="info-content">
            <span class="info-label">รหัสบุคลากร</span>
            <span class="info-value" id="t-id">-</span>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-address-card"></i></div>
          <div class="info-content">
            <span class="info-label">เลขบัตรประชาชน</span>
            <span class="info-value" id="t-card">-</span>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-phone"></i></div>
          <div class="info-content">
            <span class="info-label">เบอร์โทรศัพท์</span>
            <span class="info-value" id="t-phone">-</span>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-location-dot"></i></div>
          <div class="info-content">
            <span class="info-label">ที่อยู่ปัจจุบัน</span>
            <span class="info-value" id="t-address">-</span>
          </div>
        </div>
      </div>
    </div>

    <div class="school-footer">
      <i class="fa-solid fa-shield-halved me-1" style="color: var(--orange-accent);"></i> ระบบตรวจสอบข้อมูลบัตรโรงเรียนดิจิทัล
    </div>
  </div>

  <script>
    // ⚙️ วางลิงก์ข้อมูล CSV จาก Google Sheets ของพี่ที่ช่องว่างด้านล่างนี้ครับ
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsivTY-FtLPJ49kIP1JLQ2u_mrt_G-NGbuS3HsoZnFZ_kG7lzE0wrjIY4F0CpHc602MI7MKpH60R2Z/pub?gid=1945678561&single=true&output=csv";

    document.addEventListener("DOMContentLoaded", async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const teacherId = urlParams.get('id');

      if (!teacherId) {
        showError("กรุณาระบุรหัสบุคลากรใน URL ผ่าน QR Code");
        hideLoader();
        return;
      }

      try {
        const response = await fetch(GOOGLE_SHEET_CSV_URL);
        if (!response.ok) throw new Error("ไม่สามารถเชื่อมต่อคลาวด์ฐานข้อมูลได้");
        
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        
        let foundTeacher = null;
        for (let i = 1; i < rows.length; i++) {
          if (rows[i][1] && rows[i][1].trim() === teacherId.trim()) {
            foundTeacher = {
              teacherId: rows[i][1],
              name: rows[i][2],
              idCard: rows[i][3],
              address: rows[i][4],
              phone: rows[i][6],
              department: rows[i][7],
              photoUrl: convertDriveUrl(rows[i][8])
            };
            break;
          }
        }

        if (!foundTeacher) {
          showError(`ไม่พบข้อมูลของรหัสบุคลากร: ${teacherId}`);
          hideLoader();
          return;
        }

        // วาดข้อมูลลงหน้าจออย่างปลอดภัย
        document.getElementById("t-name").textContent = foundTeacher.name || "-";
        document.getElementById("t-dept").textContent = foundTeacher.department || "ทั่วไป / ไม่ระบุฝ่าย";
        document.getElementById("t-id").textContent = foundTeacher.teacherId || "-";
        document.getElementById("t-card").textContent = maskIdCard(foundTeacher.idCard) || "-";
        document.getElementById("t-phone").textContent = foundTeacher.phone || "-";
        document.getElementById("t-address").textContent = foundTeacher.address || "-";

        const photoImg = document.getElementById("t-photo");
        if (foundTeacher.photoUrl && foundTeacher.photoUrl.trim() !== "") {
          photoImg.src = foundTeacher.photoUrl;
        } else {
          photoImg.src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(foundTeacher.name)}&backgroundColor=0a192f&textColor=ffffff`;
        }

        document.getElementById("profile-card").style.display = "block";

      } catch (err) {
        showError("ระบบขัดข้อง: " + err.message);
      } finally {
        hideLoader();
      }
    });

    function parseCSV(text) {
      let p = '', r = []; let q = false; let row = [''];
      for (let i=0; i<text.length; i++) {
        let c = text[i]; let next = text[i+1];
        if (c === '"') { if (q && next === '"') { row[row.length-1] += '"'; i++; } else { q = !q; } }
        else if (c === ',' && !q) { row.push(''); }
        else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && next === '\n') { i++; } r.push(row); row = ['']; }
        else { row[row.length-1] += c; }
      }
      if (row.length > 1 || row[0] !== '') r.push(row);
      return r;
    }

    function convertDriveUrl(url) {
      if (!url) return "";
      let fileId = "";
      if (url.includes("/file/d/")) { fileId = url.split("/file/d/")[1].split("/")[0]; } 
      else if (url.includes("id=")) { fileId = url.split("id=")[1].split("&")[0]; }
      return fileId ? `https://drive.google.com/thumbnail?sz=w800&id=${fileId}` : url;
    }

    function maskIdCard(id) {
      if (!id || id === "-") return "-";
      let cleaned = String(id).trim();
      return cleaned.length >= 13 ? cleaned.substring(0, 3) + "-XXXXX-XXX-" + cleaned.substring(11) : cleaned;
    }

    function showError(msg) {
      document.getElementById("error-msg").textContent = msg;
      document.getElementById("error-card").style.display = "block";
    }

    function hideLoader() {
      const loader = document.getElementById("loading-screen");
      if(loader) {
        loader.style.opacity = "0";
        setTimeout(() => { loader.style.display = "none"; }, 400);
      }
    }
  </script>
</body>
</html>
