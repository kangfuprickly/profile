<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์บุคลากรโรงเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #f8fafc;
      --card-bg: #ffffff;
      --navy-primary: #0f172a;
      --navy-secondary: #1e3a8a;
      --orange-accent: #ea580c;
      --orange-light: #ffedd5;
      --text-main: #334155;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background-color: var(--bg-main);
      background-image: radial-gradient(circle at top right, #e2e8f0 0%, var(--bg-main) 60%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      margin: 0;
    }

    /* Loading Screen โทนขาวคลีน */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-main);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e2e8f0;
      border-top-color: var(--orange-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Luxury Light Profile Card */
    .profile-card {
      background: var(--card-bg);
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 24px;
      padding: 40px 28px 32px 28px;
      width: 100%;
      max-width: 410px;
      box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08),
                  0 0 1px 1px rgba(15, 23, 42, 0.02);
      position: relative;
      overflow: hidden;
      display: none;
      transform: translateY(15px);
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      to { transform: translateY(0); }
    }

    /* เส้นนำสายตาสีน้ำเงินตัดส้มด้านบนแบบพรีเมียม */
    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, var(--navy-secondary) 0%, var(--orange-accent) 100%);
    }

    /* วงแหวนออร่าล้อมรอบรูปภาพครู */
    .avatar-container {
      width: 140px; height: 140px;
      margin: 0 auto 24px auto;
      position: relative;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, var(--navy-secondary) 30%, var(--orange-accent) 100%);
      box-shadow: 0 10px 20px -5px rgba(30, 58, 138, 0.2);
    }

    .avatar-img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      background-color: #f1f5f9;
      border: 4px solid #ffffff;
    }

    .teacher-name {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--navy-primary);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .teacher-dept {
      font-size: 0.9rem;
      color: var(--orange-accent);
      text-align: center;
      font-weight: 600;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
      background: var(--orange-light);
      display: table;
      margin-left: auto;
      margin-right: auto;
      padding: 4px 16px;
      border-radius: 20px;
    }

    /* กล่องข้อมูลภายในการ์ด */
    .info-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-item {
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px 16px;
      border: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s ease;
    }

    .info-item:hover {
      background: #ffffff;
      border-color: var(--navy-secondary);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
      transform: translateX(3px);
    }

    .info-icon-box {
      width: 36px; height: 36px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy-secondary);
      font-size: 1rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .info-item:hover .info-icon-box {
      background: var(--navy-secondary);
      color: #ffffff;
      border-color: var(--navy-secondary);
    }

    .info-content {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .info-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 1px;
    }

    .info-value {
      font-size: 0.95rem;
      color: var(--navy-primary);
      font-weight: 500;
      word-break: break-word;
    }

    /* หน้าต่างแจ้งเตือนกรณีหาไม่พบ */
    .alert-card {
      background: #ffffff;
      border: 1px solid #fee2e2;
      border-radius: 24px;
      padding: 40px 24px;
      max-width: 380px;
      text-align: center;
      border-top: 5px solid #ef4444;
      box-shadow: 0 15px 30px rgba(0,0,0,0.03);
      display: none;
    }

    .alert-icon {
      font-size: 2.8rem;
      color: #ef4444;
      margin-bottom: 16px;
    }

    .school-footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 32px;
      letter-spacing: 0.5px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p class="mt-3 text-muted" style="font-size: 0.85rem;">กำลังเรียกข้อมูลโปรไฟล์โรงเรียน...</p>
  </div>

  <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="alert-card animate__animated animate__fadeIn" id="error-card">
      <div class="alert-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
      <h5 class="text-dark font-semibold mb-2">ไม่พบข้อมูลในระบบ</h5>
      <p class="text-muted mb-0" id="error-msg" style="font-size: 0.9rem;"></p>
    </div>
      
    <div class="profile-card" id="profile-card">
      <div class="avatar-container">
        <img id="t-photo" src="" alt="Teacher Profile" class="avatar-img" onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/initials/svg?seed=Teacher&backgroundColor=0f172a&textColor=ffffff';">
      </div>

      <h2 class="teacher-name" id="t-name">-</h2>
      <div class="teacher-dept" id="t-dept">-</div>

      <div class="info-body">
        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-id-badge"></i></div>
          <div class="info-content">
            <span class="info-label">รหัสบุคลากร</span>
            <span class="info-value" id="t-id">-</span>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-address-card"></i></div>
          <div class="info-content">
            <span class="info-label">เลขบัตรประชาชน</span>
            <span class="info-value" id="t-card">-</span>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-phone"></i></div>
          <div class="info-content">
            <span class="info-label">เบอร์โทรศัพท์</span>
            <span class="info-value" id="t-phone">-</span>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon-box"><i class="fa-solid fa-location-dot"></i></div>
          <div class="info-content">
            <span class="info-label">ที่อยู่ปัจจุบัน</span>
            <span class="info-value" id="t-address">-</span>
          </div>
        </div>
      </div>
    </div>

    <div class="school-footer">
      <i class="fa-solid fa-shield-check me-1" style="color: var(--navy-secondary);"></i> ระบบตรวจสอบข้อมูลบัตรโรงเรียนดิจิทัล
    </div>
  </div>

  <script>
    // ⚙️ วางลิงก์ข้อมูล CSV จาก Google Sheets ของพี่ที่ช่องว่างด้านล่างนี้ครับ
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQsivTY-FtLPJ49kIP1JLQ2u_mrt_G-NGbuS3HsoZnFZ_kG7lzE0wrjIY4F0CpHc602MI7MKpH60R2Z/pub?gid=1945678561&single=true&output=csv";

    document.addEventListener("DOMContentLoaded", async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const teacherId = urlParams.get('id');

      if (!teacherId) {
        showError("กรุณาระบุรหัสบุคลากรผ่าน QR Code ของระบบ");
        hideLoader();
        return;
      }

      try {
        const response = await fetch(GOOGLE_SHEET_CSV_URL);
        if (!response.ok) throw new Error("ไม่สามารถเชื่อมต่อคลาวด์ฐานข้อมูลได้");
        
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        
        let foundTeacher = null;
        for (let i = 1; i < rows.length; i++) {
          if (rows[i][1] && rows[i][1].trim() === teacherId.trim()) {
            foundTeacher = {
              teacherId: rows[i][1],
              name: rows[i][2],
              idCard: rows[i][3],
              address: rows[i][4],
              phone: rows[i][6],
              department: rows[i][7],
              photoUrl: convertDriveUrl(rows[i][8])
            };
            break;
          }
        }

        if (!foundTeacher) {
          showError(`ไม่พบรหัสบุคลากรหมายเลข: ${teacherId}`);
          hideLoader();
          return;
        }

        // แสดงผลลัพธ์ข้อมูลครูอย่างปลอดภัย
        document.getElementById("t-name").textContent = foundTeacher.name || "-";
        document.getElementById("t-dept").textContent = foundTeacher.department || "ทั่วไป / ไม่ระบุฝ่าย";
        document.getElementById("t-id").textContent = foundTeacher.teacherId || "-";
        document.getElementById("t-card").textContent = maskIdCard(foundTeacher.idCard) || "-";
        document.getElementById("t-phone").textContent = foundTeacher.phone || "-";
        document.getElementById("t-address").textContent = foundTeacher.address || "-";

        const photoImg = document.getElementById("t-photo");
        if (foundTeacher.photoUrl && foundTeacher.photoUrl.trim() !== "") {
          photoImg.src = foundTeacher.photoUrl;
        } else {
          photoImg.src = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(foundTeacher.name)}&backgroundColor=0f172a&textColor=ffffff`;
        }

        document.getElementById("profile-card").style.display = "block";

      } catch (err) {
        showError("ระบบขัดข้องชั่วคราว: " + err.message);
      } finally {
        hideLoader();
      }
    });

    function parseCSV(text) {
      let p = '', r = []; let q = false; let row = [''];
      for (let i=0; i<text.length; i++) {
        let c = text[i]; let next = text[i+1];
        if (c === '"') { if (q && next === '"') { row[row.length-1] += '"'; i++; } else { q = !q; } }
        else if (c === ',' && !q) { row.push(''); }
        else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && next === '\n') { i++; } r.push(row); row = ['']; }
        else { row[row.length-1] += c; }
      }
      if (row.length > 1 || row[0] !== '') r.push(row);
      return r;
    }

    function convertDriveUrl(url) {
      if (!url) return "";
      let fileId = "";
      if (url.includes("/file/d/")) { fileId = url.split("/file/d/")[1].split("/")[0]; } 
      else if (url.includes("id=")) { fileId = url.split("id=")[1].split("&")[0]; }
      return fileId ? `https://drive.google.com/thumbnail?sz=w800&id=${fileId}` : url;
    }

    function maskIdCard(id) {
      if (!id || id === "-") return "-";
      let cleaned = String(id).trim();
      return cleaned.length >= 13 ? cleaned.substring(0, 3) + "-XXXXX-XXX-" + cleaned.substring(11) : cleaned;
    }

    function showError(msg) {
      document.getElementById("error-msg").textContent = msg;
      document.getElementById("error-card").style.display = "block";
    }

    function hideLoader() {
      const loader = document.getElementById("loading-screen");
      if(loader) {
        loader.style.opacity = "0";
        setTimeout(() => { loader.style.display = "none"; }, 400);
      }
    }
  </script>
</body>
</html>
